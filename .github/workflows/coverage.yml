name: Coverage Tests

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

jobs:
    coverage:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [20.x]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: 'yarn'

            - name: Install playwright browsers
              run: npx playwright install --with-deps

            - name: Install dependencies
              run: yarn install --frozen-lockfile

            - name: Run type check
              run: yarn tsc:check

            - name: Run linting
              run: yarn lint

            - name: Run coverage tests
              run: yarn test:coverage:all

            - name: Upload coverage reports
              uses: codecov/codecov-action@v4
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: ./coverage/merged/coverage-merged.json
                  flags: unittests
                  name: codecov-umbrella
                  fail_ci_if_error: false

            - name: Upload coverage artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-report
                  path: coverage/merged/
                  retention-days: 30

            - name: Comment coverage on PR
              if: github.event_name == 'pull_request'
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require('fs');
                      const path = './coverage/merged/coverage-final.json';

                      if (fs.existsSync(path)) {
                        const coverage = JSON.parse(fs.readFileSync(path, 'utf8'));
                        
                        // Calculate total coverage from individual files
                        let totalLines = 0, coveredLines = 0;
                        let totalFunctions = 0, coveredFunctions = 0;
                        let totalBranches = 0, coveredBranches = 0;
                        let totalStatements = 0, coveredStatements = 0;
                        
                        Object.values(coverage).forEach(file => {
                            // Statements
                            if (file.s) {
                                Object.values(file.s).forEach(stat => {
                                    totalStatements += 1;
                                    if (stat > 0) coveredStatements += 1;
                                });
                            }
                            // Functions
                            if (file.f) {
                                Object.values(file.f).forEach(func => {
                                    totalFunctions += 1;
                                    if (func > 0) coveredFunctions += 1;
                                });
                            }
                            // Branches
                            if (file.b) {
                                Object.values(file.b).forEach(branch => {
                                    totalBranches += branch[0] + branch[1];
                                    coveredBranches += branch[0];
                                });
                            }
                            // Lines
                            if (file.l) {
                                Object.values(file.l).forEach(line => {
                                    totalLines += 1;
                                    if (line > 0) coveredLines += 1;
                                });
                            }
                        });
                        
                        const linesPct = totalLines > 0 ? Math.round((coveredLines / totalLines) * 100) : 0;
                        const functionsPct = totalFunctions > 0 ? Math.round((coveredFunctions / totalFunctions) * 100) : 0;
                        const branchesPct = totalBranches > 0 ? Math.round((coveredBranches / totalBranches) * 100) : 0;
                        const statementsPct = totalStatements > 0 ? Math.round((coveredStatements / totalStatements) * 100) : 0;
                        
                        const comment = `
                        ## 📊 Coverage Report
                        
                        | Metric | Coverage |
                        |--------|----------|
                        | Lines | ${linesPct}% |
                        | Functions | ${functionsPct}% |
                        | Branches | ${branchesPct}% |
                        | Statements | ${statementsPct}% |
                        
                        [View detailed coverage report](https://codecov.io/gh/${{ github.repository }}/pull/${{ github.event.number }})
                        `;
                        
                        github.rest.issues.createComment({
                          issue_number: context.issue.number,
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          body: comment
                        });
                      }
